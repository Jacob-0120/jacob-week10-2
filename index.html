<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Image Styling Practice</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }

        .image-container {
            display: flex;
            /* ★ 修正 1：改用 space-between 讓圖片之間只保留最小的緊湊間隙 */
            justify-content: space-between; 
            align-items: center;
            width: 100%;
            /* ★ 修正 2：嚴格限制最大寬度。這樣 33% 就會是瘦長的矩形，不會因為大螢幕而變胖 */
            max-width: 520px; 
            padding: 20px;
        }

        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover;
        }

        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }

        .img-right {
            width: 33%;
            height: 300px;
            /* 這裡沒有 object-fit，會產生擠壓變形 */
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img class="img-left" src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=800&h=600&fit=crop" alt="Eiffel Tower Left">
        
        <img class="img-center" src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=400&h=400&fit=crop" alt="Cliff View">
        
        <img class="img-right" src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=800&h=600&fit=crop" alt="Eiffel Tower Right">
    </div>

</body>
</html>
