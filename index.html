<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Image Styling</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
    }

    .container {
      width: 90%;
      margin: 80px auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
    }

    /* left image: width 33%, radius 18px, no distortion */
    .left-img {
      width: 33%;
      height: auto;
      border-radius: 18px;
    }

    /* middle image: circle, 150px, border, no distortion */
    .circle-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #333;
      object-fit: cover;
    }

    /* right image: width 33%, height 300px, distortion */
    .right-img {
      width: 33%;
      height: 300px;
      border-radius: 0;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="paris.jpg" alt="Paris image" class="left-img">

    <img src="mountain.jpg" alt="Mountain image" class="circle-img">

    <img src="paris.jpg" alt="Distorted Paris image" class="right-img">
  </div>

</body>
</html>
